  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <style>
    body{font-family:Segoe UI,Roboto,Arial,sans-serif;max-width:960px;margin:36px auto;padding:0 20px;color:#111}

<body>
  <header>
    <h1>ids401 — Pokémon Manager</h1>
    <div><a class="button" href="https://github.com/TUTULEMAN/ids401">View on GitHub</a></div>
  </header>

  <p>This page shows the project source for quick browsing. The raw file is available below.</p>

  <p>Source: <a href="pokemonmanager.java">pokemonmanager.java</a></p>

  <pre><code id="code" class="language-java"></code></pre>

  <script>
    async function loadCode(){
      const res = await fetch('pokemonmanager.java');
      const text = await res.text();
      const el = document.getElementById('code');
      el.textContent = text;
      hljs.highlightElement(el);
    }
    loadCode().catch(()=>{document.getElementById('code').textContent='Could not load source.'});
  </script>
